name: Fetch Games from IGDB

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: 'سال شروع (اختیاری - پیش‌فرض 2000)'
        required: false
        default: '2000'
        type: string
      end_year:
        description: 'سال پایان (اختیاری - پیش‌فرض 2026)'
        required: false
        default: '2026'
        type: string
      year_chunk_size:
        description: 'تعداد سال در هر قطعه (اختیاری - پیش‌فرض 3)'
        required: false
        default: '3'
        type: string

  schedule:
    - cron: '0 0 * * 0'

jobs:
  fetch-games:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    # ✅ بخش مهم: اینجا یک متغیر محیطی برای رفع مشکل Node.js اضافه شده است
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # ✅ اینجا یک فایل requirements.txt خالی ایجاد می‌کنیم تا اخطار اول را هم رفع کنیم
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'
      
      # ✅ مرحله جدید: ایجاد فایل requirements.txt خالی برای رفع اخطار
      - name: Create requirements.txt
        run: touch requirements.txt
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: ℹ️ Show environment info
        run: |
          echo "Python version:"
          python --version
          echo "Current directory:"
          pwd
          ls -la
      
      - name: 🚀 Run fetch script
        run: python fetch_games.py
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      
      - name: 📋 List generated files
        run: |
          echo "Generated JSON files:"
          ls -la *.json 2>/dev/null || echo "No JSON files found yet"
        continue-on-error: true
      
      - name: 📤 Upload JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          name: igdb-games-data
          path: |
            games_*.json
            stats_*.json
          retention-days: 30
          if-no-files-found: warn
      
      - name: ✅ Success notification
        if: success()
        run: |
          echo "🎉 Workflow completed successfully!"
          echo "📊 You can download the JSON files from the Artifacts section below."
      
      - name: ❌ Failure notification
        if: failure()
        run: |
          echo "❌ Workflow failed!"
          echo "Please check the logs above for more information."
